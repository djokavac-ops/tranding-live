<!doctype html><html lang="sr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Auto Demo Trading</title><link rel="stylesheet" href="/style.css"></head><body><main><header><h1>Auto Demo Bot</h1><p>Paper trading: dnevni target, max loss i automatsko zaustavljanje. Ne trguje pravim novcem.</p><button id="refresh">Osveži</button><button id="runBot">Pokreni demo ciklus</button><select id="filter"><option value="ALL">Sve</option><option value="Commodities">Commodities</option><option value="Indices">Indices</option><option value="Crypto">Crypto</option><option value="Stocks">Stocks</option></select></header><section class="card"><h2>Auto-demo pravila</h2><div class="grid"><label>Dnevni target (€)<input id="dailyTarget" type="number" value="50" step="5"></label><label>Dnevni max loss (€)<input id="dailyLoss" type="number" value="50" step="5"></label><label>Račun (€)<input id="account" type="number" value="5000" step="50"></label><label>Rizik po trejdu (%)<input id="riskPct" type="number" value="0.5" step="0.1"></label></div><div class="metric"><span>Današnji demo PnL</span><strong id="demoPnl">0 €</strong></div><div class="metric"><span>Broj demo trejdova</span><strong id="demoTrades">0</strong></div><div class="metric"><span>Status</span><strong id="botStatus">Spreman</strong></div><button id="resetDay">Resetuj demo dan</button></section><section id="summary" class="summary"></section><section id="cards" class="cards"></section><section class="card"><h2>Dnevnik</h2><textarea id="journal" placeholder="Plan, emocije, greške, zaključak..."></textarea><button id="save">Sačuvaj</button></section><footer>Demo-bot je edukativan. Live auto-trading tek posle testiranja na demo nalogu.</footer><script src="/app.js"></script></main></body></html>
