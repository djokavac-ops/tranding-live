<!doctype html>
<html lang="sr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Trading Live">
<title>Trading Live</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
<header>
<h1>Trading Live</h1>
<p>WTI, Gold, Nasdaq, S&P 500, Bitcoin — cene, signali, pozicije i rizik.</p>
<button id="refresh">Osveži</button>
</header>

<section id="cards" class="cards"></section>

<section class="card">
<h2>Kalkulator rizika</h2>
<div class="grid">
<label>Račun (€)<input id="account" type="number" value="5000" step="50"></label>
<label>Rizik (%)<input id="riskPct" type="number" value="1" step="0.1"></label>
<label>Ulaz<input id="entry" type="number" value="77.56" step="0.01"></label>
<label>Stop<input id="stop" type="number" value="68" step="0.01"></label>
</div>
<div class="metric"><span>Max rizik</span><strong id="riskMoney">—</strong></div>
<div class="metric"><span>Predložena količina</span><strong id="qty">—</strong></div>
</section>

<section class="card">
<h2>Dnevnik</h2>
<textarea id="journal" placeholder="Plan trejda, emocije, greške, zaključak..."></textarea>
<button id="save">Sačuvaj</button>
</section>

<footer>Podaci mogu kasniti. Aplikacija je za praćenje i disciplinu, ne garancija profita.</footer>
</main>
<script src="/app.js"></script>
</body>
</html>
